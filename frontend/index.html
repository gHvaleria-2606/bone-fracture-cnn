<!DOCTYPE html>
<html>
<head>
    <title>Bone Fracture Detector</title>
    <style>
        body {
            font-family:'Courier New', Courier, monospace;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            width: 380px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #111;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: #555;
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            cursor: pointer;
        }

        button:hover { background: #333; }

        #result {
            margin-top: 1.25rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #111;
            min-height: 1.5em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>X-Ray Bone Fracture Detector</h1>
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="uploadImage()">Predict</button>
        <div id="result"></div>
    </div>

    <script>
        async function uploadImage() {
            const file = document.getElementById("imageInput").files[0];
            if (!file) { alert("Please select an image"); return; }

            const formData = new FormData();
            formData.append("file", file);

            const response = await fetch("http://127.0.0.1:8000/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            const label = data.prediction == 0 ? "Fractured" : "Non-fractured";
            document.getElementById("result").innerText = "Prediction: " + label;
        }
    </script>
</body>
</html>
